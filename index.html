<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PediAid Academics</title>

    <!-- Warm the TLS connection to the backend so the very first API call
         doesn't pay a full handshake. Combined with the wake-up fetch
         below, this hides most of Render's cold-start latency behind the
         splash screen. -->
    <link rel="preconnect" href="https://pediaid-backend.onrender.com" crossorigin />

    <script>
      // Restore path encoded by 404.html redirect
      (function() {
        var p = window.location.search.match(/p=([^&]*)/);
        if (p) {
          window.history.replaceState(null, null,
            '/' + decodeURIComponent(p[1]) + window.location.hash
          );
        }
      })();

      // Kick the backend awake while the splash is on screen. Render's free
      // tier sleeps after 15 min of inactivity, so the first request from a
      // cold visitor would otherwise block on a ~30s spin-up. Firing this
      // ping during the splash hides that latency. Fire-and-forget — we
      // don't care about the response, only about triggering the boot.
      //
      // Uses /api/ping rather than /health because /api/ping is the
      // lightweight keep-alive route that skips rate limiting and DB
      // checks — it's the fastest possible wake-up signal.
      try {
        fetch('https://pediaid-backend.onrender.com/api/ping', {
          method: 'GET',
          mode: 'cors',
          cache: 'no-store',
          credentials: 'omit',
        }).catch(function() { /* offline or cors blocked — ignore */ });
      } catch (e) { /* ancient browser — ignore */ }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Splash screen — shown immediately while the JS bundle parses and
         React hydrates. Removed via a MutationObserver in src/main.tsx
         the moment the app mounts its first child into #root, then the
         app fades in over 0.3s.

         The splash is inlined here so it shows with zero additional
         network requests on a cold visit. */
      html, body {
        margin: 0;
        padding: 0;
        background: #1e3a5f;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      #acad-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #1e3a5f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        opacity: 1;
        transition: opacity 0.35s ease-out;
      }
      #acad-splash.fading { opacity: 0; pointer-events: none; }
      #acad-splash .acad-title {
        color: #ffffff;
        font-size: 38px;
        font-weight: 800;
        letter-spacing: -0.5px;
        opacity: 0;
        animation:
          acad-fade-in 0.5s ease-out 0.05s forwards,
          acad-pulse 2.2s ease-in-out 0.6s infinite;
        transform-origin: center;
      }
      #acad-splash .acad-dot {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        animation: acad-fade-in 0.5s ease-out forwards;
      }
      #acad-splash .acad-dot svg { width: 24px; height: 24px; }
      #acad-splash .acad-sub {
        color: rgba(255, 255, 255, 0.7);
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.3px;
        opacity: 0;
        animation: acad-fade-in 0.6s ease-out 0.25s forwards;
      }
      @keyframes acad-fade-in {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes acad-pulse {
        0%, 100% { transform: scale(1);    opacity: 1;   }
        50%      { transform: scale(1.05); opacity: 0.9; }
      }
      /* App fade-in. #root starts hidden and fades in once React renders
         its first child, coordinated by src/main.tsx. */
      #root {
        opacity: 0;
        transition: opacity 0.3s ease-out;
      }
      #root.ready { opacity: 1; }
    </style>
  </head>
  <body>
    <!-- Splash screen — removed by main.tsx once React mounts. -->
    <div id="acad-splash">
      <div class="acad-dot">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M12 2L3 7v10l9 5 9-5V7L12 2z"
            stroke="white"
            stroke-width="1.8"
            stroke-linejoin="round"
          />
          <path
            d="M12 7v10M7 9.5l5 2.5 5-2.5"
            stroke="white"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </div>
      <div class="acad-title">PediAid</div>
      <div class="acad-sub">loading academics…</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
